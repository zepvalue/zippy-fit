  - type: web
    name: zippy-fit-backend
    branch: staging
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CONVEX_DEPLOYMENT
        sync: false
      - key: CONVEX_URL
        sync: false
